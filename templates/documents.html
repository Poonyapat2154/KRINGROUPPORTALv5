{% extends 'base.html' %}{% set page_title='Documents' %}{% block content %}<section class="card"><h2>All Uploaded Documents</h2><div class="doc-list">{% for d in documents %}<a href="{{ url_for('uploaded_file', filename=d.filename) }}">📎 {{d.original_name}} <small>{{d.project.name if d.project else ''}} · {{d.uploaded_by}}</small></a>{% else %}<p class="muted">No documents uploaded.</p>{% endfor %}</div></section>{% endblock %}
