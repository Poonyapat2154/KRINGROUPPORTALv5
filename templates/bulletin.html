{% extends 'base.html' %}{% set page_title='Bulletin Board' %}{% block content %}<div class="grid-main"><section class="card"><h2>Post Announcement</h2><form method="post" class="clean-form"><label>Title</label><input name="title" required><label>Message</label><textarea name="message" required></textarea><button class="btn primary">Post</button></form></section><section class="card wide"><h2>Announcements</h2>{% for b in bulletins %}<div class="notice"><b>{{b.title}}</b><span>{{b.message}}</span><small>{{b.created_by}} · {{b.created_at.strftime('%d %b %Y %H:%M')}}</small></div>{% endfor %}</section></div>{% endblock %}
