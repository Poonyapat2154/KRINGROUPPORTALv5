{% extends 'base.html' %}{% set page_title=('Edit Project' if project else 'Add Project') %}{% block content %}<section class="card"><h2>{{ page_title }}</h2><form method="post" class="form-grid"><label>Project Name<input name="name" value="{{project.name if project else ''}}" required></label><label>Contract Number<input name="contract_number" value="{{project.contract_number if project else ''}}"></label><label>Organization<select name="organization">{% for o in organizations %}<option {{'selected' if project and project.organization==o}}>{{o}}</option>{% endfor %}</select></label><label>Client / Stakeholder<input name="client" value="{{project.client if project else ''}}"></label><label>Project Value<input type="number" step="0.01" name="value" value="{{project.value if project else 0}}"></label><label>Department<select name="department">{% for d in departments %}<option {{'selected' if project and project.department==d}}>{{d}}</option>{% endfor %}</select></label><label>Project Manager<input name="manager" value="{{project.manager if project else current_user.name}}"></label><label>Priority<select name="priority">{% for p in priorities %}<option {{'selected' if project and project.priority==p}}>{{p}}</option>{% endfor %}</select></label><label>Status<select name="status">{% for s in statuses %}<option {{'selected' if project and project.status==s}}>{{s}}</option>{% endfor %}</select></label><label>Progress %<input type="number" min="0" max="100" name="progress" value="{{project.progress if project else 0}}"></label><label>Start Date<input type="date" name="start_date" value="{{project.start_date if project and project.start_date else ''}}"></label><label>End Date<input type="date" name="end_date" value="{{project.end_date if project and project.end_date else ''}}"></label><label class="fullspan">Description<textarea name="description">{{project.description if project else ''}}</textarea></label><div class="fullspan form-actions"><button class="btn primary">Save Project</button><a class="btn" href="{{ url_for('projects') }}">Cancel</a></div></form></section>{% endblock %}
