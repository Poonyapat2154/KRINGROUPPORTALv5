{% extends 'base.html' %}{% set page_title=('Edit Employee' if user else 'Add Employee') %}{% block content %}<section class="card"><h2>{{page_title}}</h2><form method="post" class="form-grid"><label>Name<input name="name" value="{{user.name if user else ''}}" required></label><label>Email<input type="email" name="email" value="{{user.email if user else ''}}" required></label><label>Department<select name="department">{% for d in departments %}<option {{'selected' if user and user.department==d}}>{{d}}</option>{% endfor %}</select></label><label>Role<select name="role"><option {{'selected' if user and user.role=='Employee'}}>Employee</option><option {{'selected' if user and user.role=='Admin'}}>Admin</option><option {{'selected' if user and user.role=='Viewer'}}>Viewer</option></select></label><label class="fullspan">Password {{'(leave blank to keep current)' if user else ''}}<input type="password" name="password" {{'required' if not user}}></label><div class="fullspan form-actions"><button class="btn primary">Save Employee</button><a class="btn" href="{{ url_for('employees') }}">Cancel</a></div></form></section>{% endblock %}
